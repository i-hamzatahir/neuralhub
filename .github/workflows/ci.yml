name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/neuralhub"
          DIRECT_DATABASE_URL: "postgresql://user:pass@localhost:5432/neuralhub"
          AUTH_SECRET: "ci-build-secret-placeholder-min-32-chars-long"
          CRON_SECRET: "ci-cron-secret-placeholder-min-32-chars"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NEXT_PUBLIC_SUPABASE_URL: "https://example.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "ci-supabase-service-role-placeholder-key"
